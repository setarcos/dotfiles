<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>MesloLGS NF</family>
    <prefer>
      <family>MesloLGS NF</family>
      <family>Noto Color Emoji</family>
     </prefer>
  </alias>
    <alias>
    <family>MesloLGS NF Bold</family>
    <prefer>
      <family>MesloLGS NF Bold</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
    <alias>
    <family>MesloLGS NF Italic</family>
    <prefer>
       <family>MesloLGS NF Italic</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
